name: Run Script in CI

on:
  push:
    branches:
      - main
      - feature/**

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        if: hashFiles('*.py') != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        if: hashFiles('requirements.txt') != ''
        run: pip install -r requirements.txt

      - name: Run Python script
        if: hashFiles('scripts/greet.py') != ''
        run: python scripts/greet.py

      - name: Run Shell script
        if: hashFiles('scripts/greet.sh') != ''
        run: bash scripts/greet.sh
