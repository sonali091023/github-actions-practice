name: Multi Job Pipeline

on:
  push:

jobs:
  build:                                       #build runs first no dependencies available
    runs-on: ubuntu-latest
    steps:
      - name: Build step
        run: echo "Building the app"

  test:                                        #test runs only if build succeeds
    runs-on: ubuntu-latest
    needs: build                                 #depends on build
    steps:
      - name: Test step
        run: echo "Running tests"

  deploy:                                       #deploy runs only if test succeeds
    runs-on: ubuntu-latest
    needs: test                                  #depends on test
    steps:
      - name: Deploy step
        run: echo "Deploying"
