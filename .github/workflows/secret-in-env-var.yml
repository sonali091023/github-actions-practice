name: Secret Env Example

on: [push]

jobs:
  use-secret:
    runs-on: ubuntu-latest

    steps:
      - name: Use secret via environment variable
        env:
          MY_SECRET: ${{ secrets.MY_SECRET_MESSAGE }}
        run: |
          if [ -n "$MY_SECRET" ]; then
            echo "Secret is available"
          else
            echo "Secret is missing"
          fi
