name: Secret Test

on: [push]            #we can write it like this as well, This is array 

jobs:
  check-secret:
    runs-on: ubuntu-latest

    steps:
      - name: Check if secret exists
        run: |
          if [ -z "${{ secrets.MY_SECRET_MESSAGE }}" ]; then
            echo "The secret is set: false"
          else
            echo "The secret is set: true"
          fi

      - name: Try printing secret directly (NOT recommended)
        run: |
          echo "Secret value: ${{ secrets.MY_SECRET_MESSAGE }}"
