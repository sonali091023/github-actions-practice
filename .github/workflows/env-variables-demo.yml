name: Env Variables Demo

on:
  push:

#Workflow-level environment variable
env:
  APP_NAME: myapp

jobs:
  demo:
    runs-on: ubuntu-latest

    #Job-level environment variable
    env:
      ENVIRONMENT: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print all variables
        #Step-level environment variable
        env:
          VERSION: 1.0.0
        run: |
          echo "App Name (Workflow level): $APP_NAME"
          echo "Environment (Job level): $ENVIRONMENT"
          echo "Version (Step level): $VERSION"

          echo "Commit SHA: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
